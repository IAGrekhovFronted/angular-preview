<div class="docx-preview-page-wrapper">
  <div class="docx-preview-page-wrapper__info">
    Компонент, реализованный через библиотеку docx-preview
  </div>
  <import-file
    (sourceChange)="onSourceChange($event)"
    (urlChange)="onUrlInputChange($event)"
  ></import-file>
  <div class="docx-preview-page-wrapper__preview">
    <app-docx-preview [src]="docxSource"></app-docx-preview>
  </div>
</div>
